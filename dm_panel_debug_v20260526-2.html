<!doctype html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<title>覆雪之下 DM 控制台 v20260526-2</title>
<style>
:root {
--bg: #0b1120;
--card: #131c31;
--border: #1e3a5f;
--text: #e2e8f0;
--muted: #94a3b8;
--accent: #3b82f6;
--danger: #ef4444;
--good: #22c55e;
font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
color-scheme: dark;
}
* { box-sizing: border-box; }
body {
margin: 0;
min-height: 100vh;
display: grid;
place-items: center;
padding: 22px;
background:
radial-gradient(circle at top left, rgba(59,130,246,.22), transparent 34rem),
linear-gradient(145deg, #07101f, var(--bg));
color: var(--text);
}
.card {
width: min(520px, 100%);
border: 1px solid var(--border);
border-radius: 10px;
background: rgba(19, 28, 49, .92);
padding: 22px;
box-shadow: 0 24px 80px rgba(0,0,0,.35);
}
.brand {
display: flex;
gap: 12px;
align-items: center;
margin-bottom: 18px;
}
.mark {
width: 42px;
height: 42px;
border-radius: 50%;
border: 1px solid var(--border);
display: grid;
place-items: center;
background: #020617;
font-size: 24px;
}
h1 {
font-size: 22px;
margin: 0;
}
.sub {
color: var(--muted);
font-size: 13px;
margin-top: 4px;
}
label {
display: grid;
gap: 6px;
color: var(--muted);
font-size: 13px;
margin: 12px 0;
}
input {
width: 100%;
min-height: 42px;
border: 1px solid var(--border);
border-radius: 8px;

background: #0f172a;
color: var(--text);
padding: 8px 10px;
font: inherit;
}
button {
width: 100%;
min-height: 44px;
margin-top: 8px;
border: 1px solid #60a5fa;
border-radius: 8px;
background: linear-gradient(135deg, #2563eb, #3b82f6);
color: white;
font: inherit;
font-weight: 700;
cursor: pointer;
}
button:disabled {
opacity: .65;
cursor: wait;
}
.error {
display: none;
margin-top: 12px;
border: 1px solid rgba(239,68,68,.55);
border-radius: 8px;
background: rgba(239,68,68,.12);
color: #fecaca;
padding: 10px;
white-space: pre-wrap;
font-size: 13px;
line-height: 1.55;
}
.error.show { display: block; }
.ok {
display: none;
margin-top: 12px;
border: 1px solid rgba(34,197,94,.55);
border-radius: 8px;
background: rgba(34,197,94,.1);
color: #bbf7d0;
padding: 10px;
white-space: pre-wrap;
font-size: 13px;
line-height: 1.55;
}
.ok.show { display: block; }
.debug {
margin-top: 14px;
border: 1px solid rgba(96,165,250,.4);
border-radius: 8px;
background: rgba(15,23,42,.92);
color: #bfdbfe;
padding: 10px;
font-family: Consolas, ui-monospace, monospace;
font-size: 12px;
line-height: 1.55;
white-space: pre-wrap;
max-height: 260px;
overflow: auto;
}
.hint {
margin-top: 12px;
color: var(--muted);
font-size: 12px;
line-height: 1.6;
}
</style>
</head>
<body>
<main class="card">
<div class="brand">
<div class="mark">☯</div>
<div>
<h1>覆雪之下 DM 控制台</h1>
<div class="sub">版本：v20260526-2 · 永不落幕的梦</div>
</div>
</div>
<label>
账号
<input id="username" autocomplete="username" value="dm" />
</label>
<label>
密码
<input id="password" type="password" autocomplete="current-password" value="dm" />
</label>
<button id="loginBtn" type="button">进入后台</button>
<div id="ok" class="ok"></div>

<div id="error" class="error"></div>
<div id="debug" class="debug">等待操作...</div>
<div class="hint">
如果你能看到这个版本号，说明服务器 HTML 已更新。<br />
点击登录后，下面调试框必须出现请求地址、响应码和返回内容。
</div>
</main>
<script>
const VERSION = "v20260526-2";
const $ = (id) => document.getElementById(id);
function log(message) {
const time = new Date().toLocaleTimeString();
$("debug").textContent = `${time}  ${message}\n${$("debug").textContent}`.slice(0, 5000);
}
function showError(message) {
$("error").textContent = message;
$("error").classList.add("show");
$("ok").classList.remove("show");
log("\u9519\u8bef\uff1a" + message);
}
function showOk(message) {
$("ok").textContent = message;
$("ok").classList.add("show");
$("error").classList.remove("show");
log("\u6210\u529f\uff1a" + message);
}
window.addEventListener("error", (event) => {
showError("\u9875\u9762 JS \u9519\u8bef\uff1a\n" + event.message);
});
window.addEventListener("unhandledrejection", (event) => {
showError("\u5f02\u6b65\u9519\u8bef\uff1a\n" + (event.reason?.message || event.reason || "\u672a\u77e5\u9519\u8bef"));
});
async function login() {
const btn = $("loginBtn");
const username = $("username").value.trim();
const password = $("password").value;
$("error").classList.remove("show");
$("ok").classList.remove("show");
if (!username || !password) {
showError("\u8bf7\u8f93\u5165\u8d26\u53f7\u548c\u5bc6\u7801");
return;
}
const url = "/api/auth/login";
const fullUrl = location.origin + url;
btn.disabled = true;
btn.textContent = "\u6b63\u5728\u767b\u5f55";
log("\u9875\u9762\u7248\u672c\uff1a" + VERSION);
log("\u70b9\u51fb\u8fdb\u5165\u540e\u53f0");
log("\u5f53\u524d\u5730\u5740\uff1a" + location.href);
log("\u8bf7\u6c42\u5730\u5740\uff1a" + fullUrl);
log("\u8bf7\u6c42\u4f53\uff1a" + JSON.stringify({ username, password: "***" }));
try {
const response = await fetch(url, {
method: "POST",
headers: {
"Content-Type": "application/json",
"Accept": "application/json"
},
body: JSON.stringify({ username, password }),
cache: "no-store",
credentials: "same-origin"
});
log("\u54cd\u5e94\u72b6\u6001\uff1a" + response.status + " " + response.statusText);
log("\u54cd\u5e94 Content-Type\uff1a" + (response.headers.get("content-type") || "(\u7a7a)"));
const text = await response.text();
log("\u54cd\u5e94\u539f\u6587\u524d 800 \u5b57\uff1a\n" + text.slice(0, 800));

let data = null;
try {
data = text ? JSON.parse(text) : null;
log("JSON \u89e3\u6790\u6210\u529f");
} catch (err) {
throw new Error(
"\u540e\u7aef\u8fd4\u56de\u7684\u4e0d\u662f JSON\uff0c\u53ef\u80fd Nginx /api/ \u8f6c\u53d1\u9519\u4e86\u3002\n\n\u8fd4\u56de\u5f00\u5934\uff1a\n" +
text.slice(0, 300)
);
}
if (!response.ok) {
throw new Error(data?.detail || data?.message || ("HTTP " + response.status));
}
if (data?.success === false) {
throw new Error(data?.detail || data?.message || "\u540e\u7aef\u8fd4\u56de success=false");
}
localStorage.setItem("snowfall_dm_user", JSON.stringify({
username,
token: data?.token || data?.access_token || "",
id: data?.userId || data?.playerId || data?.id || "",
name: data?.playerName || data?.name || username,
role: data?.role || "dm"
}));
showOk(
"\u767b\u5f55\u63a5\u53e3\u6210\u529f\u3002\n\n" +
"\u7528\u6237\uff1a" + (data?.playerName || data?.name || username) + "\n" +
"\u89d2\u8272\uff1a" + (data?.role || "dm") + "\n\n" +
"\u4e0b\u4e00\u6b65\u53ef\u4ee5\u6362\u56de\u5b8c\u6574 DM \u9762\u677f\u3002"
);
} catch (err) {
showError(
"\u767b\u5f55\u5931\u8d25\uff1a\n" +
(err?.message || err) +
"\n\n\u8bf7\u628a\u84dd\u8272\u8c03\u8bd5\u6846\u91cc\u7684\u5185\u5bb9\u53d1\u56de\u6765\u3002"
);
} finally {
btn.disabled = false;
btn.textContent = "\u8fdb\u5165\u540e\u53f0";
}
}
$("loginBtn").addEventListener("click", login);
["username", "password"].forEach((id) => {
$(id).addEventListener("keydown", (event) => {
if (event.key === "Enter") login();
});
});
log("\u8bca\u65ad\u9875\u9762\u5df2\u52a0\u8f7d\uff1a" + VERSION);
log("\u5982\u679c\u7ebf\u4e0a\u770b\u4e0d\u5230\u8fd9\u4e2a\u7248\u672c\u53f7\uff0c\u8bf4\u660e index.html \u6ca1\u8986\u76d6\u6210\u529f\u6216\u6d4f\u89c8\u5668\u7f13\u5b58\u65e7\u9875\u9762\u3002");
</script>
</body>
</html>
